version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: taskflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskflow
    ports:
      - '5432:5432'
    volumes:
      - taskflow_postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: taskflow-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/taskflow
    ports:
      - '8000:8000'
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: taskflow-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  taskflow_postgres_data:
